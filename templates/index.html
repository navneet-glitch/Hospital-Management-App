<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard 🏥</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: #f4f6f9;
        }

        .container {
            width: 85%;
            margin: auto;
            margin-top: 30px;
        }

        h1 {
            text-align: center;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        input {
            padding: 8px;
            width: 200px;
        }

        .btn {
            padding: 8px 15px;
            background: #667eea;
            color: white;
            border-radius: 5px;
            text-decoration: none;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        th {
            background: #667eea;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        .action a {
            margin: 0 5px;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 5px;
            color: white;
        }

        .edit { background: orange; }
        .delete { background: red; }
    </style>
</head>

<body>

<div class="container">

<h1>🏥 Patient Dashboard</h1>

<div class="top-bar">
    <form action="/search">
        <input type="text" name="q" placeholder="Search patient...">
        <button type="submit">🔍</button>
    </form>

    <a href="/add" class="btn">➕ Add Patient</a>
</div>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Disease</th>
        <th>Actions</th>
    </tr>

    {% for p in patients %}
    <tr>
        <td>{{ p[0] }}</td>
        <td>{{ p[1] }}</td>
        <td>{{ p[2] }}</td>
        <td>{{ p[3] }}</td>
        <td class="action">
            <a href="/edit/{{p[0]}}" class="edit">Edit</a>
            <a href="/delete/{{p[0]}}" class="delete">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

</div>

</body>
</html>
