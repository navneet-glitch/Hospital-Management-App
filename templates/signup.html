<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #EAF3DE, #f7fbf7);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
    padding: 35px;
    border-radius: 16px;
    width: 320px;
    border: 1px solid #d4e8d4;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.title {
    text-align: center;
    font-size: 22px;
    color: #27500A;
    margin-bottom: 20px;
}

.input-group {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #c8e8c8;
    outline: none;
    font-family: 'Poppins';
}

input:focus {
    border-color: #3B6D11;
}

.btn {
    width: 100%;
    padding: 10px;
    border: none;
    background: #3B6D11;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
}

.btn:hover {
    background: #27500A;
}

.link {
    text-align: center;
    margin-top: 12px;
    font-size: 13px;
}

.link a {
    color: #3B6D11;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="card">
    <div class="title">Create Account ✨</div>

    <form method="POST">
        <div class="input-group">
            <input type="text" name="name" placeholder="Name" required>
        </div>
        <div class="input-group">
            <input type="email" name="email" placeholder="Email" required>
        </div>

        <div class="input-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button class="btn">Signup</button>
    </form>

    <div class="link">
        Already have account? <a href="/login">Login</a>
    </div>
</div>

</body>
</html>
